name: 2027 SWE scan

on:
  schedule:
    # 10 runs/day, roughly every 2.5h. Minute :17 avoids GitHub's
    # congested top-of-hour cron slots.
    - cron: '17 0,2,5,7,10,12,14,17,19,22 * * *'
  workflow_dispatch:         # manual trigger button

permissions:
  contents: write

concurrency:
  group: swe-scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Use a PAT so the commit counts toward your contribution graph.
          # Create a fine-grained token (repo: contents read/write) and save
          # it as a repository secret named RADAR_PAT.
          token: ${{ secrets.RADAR_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Run scanner
        id: scan
        env:
          # Optional: enables the Adzuna aggregator source.
          # Free key at https://developer.adzuna.com — save both as repo secrets.
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
        run: |
          MSG=$(python scan.py)
          echo "msg=$MSG" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        run: |
          git config user.name "YuKai Edward Huang"
          git config user.email "${{ secrets.GIT_EMAIL }}"
          git add data/ README.md
          git diff --cached --quiet && echo "Nothing to commit" && exit 0
          git commit -m "${{ steps.scan.outputs.msg }}"
          git push
