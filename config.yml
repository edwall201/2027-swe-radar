# 2027-swe-radar configuration
# Edit keywords and the Greenhouse watchlist freely — the scanner reads this on every run.

# Ignore postings older than this date (ISO format).
min_posted: "2026-07-01"

# Only keep postings with at least one US location.
us_only: true

keywords:
  # Title must contain at least one of these — keeps recruiter/sales/etc.
  # roles from full company boards out of the radar.
  require:
    - "software"
    - "engineer"
    - "developer"
    - "swe"
  include:
    - "2027"
    - "new grad"
    - "new graduate"
    - "university grad"
    - "early career"
    - "junior software"
    - "entry level software"
    - "software engineer i"
  exclude:
    - "senior"
    - "staff"
    - "principal"
    - "manager"
    - "intern"        # remove this line if you also want internships
    - "phd"

# Companies with public Greenhouse boards to watch directly.
# Board slug = the name in the URL: boards.greenhouse.io/<slug>
greenhouse_boards:
  - stripe
  - databricks
  - figma
  - duolingo
  - samsara
  - cloudflare

# Companies with public Lever boards: jobs.lever.co/<slug>
lever_boards:
  - palantir
  - plaid

# Companies with public Ashby boards: jobs.ashbyhq.com/<slug>
ashby_boards:
  - openai
  - ramp
  - linear
  - notion
